services:
  - type: web
    name: mlops-monitor-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: PREDICTION_THRESHOLD
        value: 0.5
      - key: DATABASE_URL
        fromDatabase:
          name: mlops-monitor-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: MODEL_PATH
        sync: false
      - key: SCALER_PATH
        sync: false
      - key: REFERENCE_DATA_PATH
        sync: false

databases:
  - name: mlops-monitor-db
    plan: free
